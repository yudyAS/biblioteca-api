services:
  - type: web
    name: biblioteca-api
    env: docker
    dockerfilePath: ./Dockerfile
    
    # Auto-deploy from GitHub
    autoDeployOnPush: true
    
    # Build settings
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/biblioteca-api-*.jar
    
    # Health check
    healthCheckPath: /api/categorias
    healthCheckStartupFailureThreshold: 10
    
    # Environment variables
    envVars:
      - key: JAVA_OPTS
        value: -Xmx512m -Xms256m
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8080
      
      # Database configuration (add your PostgreSQL instance URL)
      - key: DB_URL
        value: jdbc:postgresql://${DATABASE_HOST}:5432/${DATABASE_NAME}
      - key: DB_USER
        scope: secret
      - key: DB_PASSWORD
        scope: secret
