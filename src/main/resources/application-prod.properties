## Production profile - expects database connection via environment variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Do not allow Hibernate to auto-create/alter schema in production
spring.jpa.hibernate.ddl-auto=validate

# Production server port (set by Render via PORT environment variable)
server.port=${PORT:8080}

# Connection pool for PostgreSQL
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate configuration for production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging for production - minimal
logging.level.root=WARN
logging.level.br.com.biblioteca=INFO
logging.level.org.springframework.boot=WARN

# Disable H2 console in production
spring.h2.console.enabled=false
